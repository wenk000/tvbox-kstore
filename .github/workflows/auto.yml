name: Generate TVBox Source

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'   # 每6小时更新一次（UTC时间）

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 完整历史，commit 必需

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run script
        run: python generate.py

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          message: "Auto update TVBox source"
          committer_name: GitHub Actions
          committer_email: actions@github.com
          add: "download/*"

