<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVBox 管理后台 - 杰翔易达</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(78, 205, 196, 0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 20%, rgba(99, 102, 241, 0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 80%, rgba(236, 72, 153, 0.04) 0%, transparent 50%);
            animation: bgDrift 20s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes bgDrift {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(-2%, 1%) rotate(1deg); }
            66% { transform: translate(1%, -1%) rotate(-0.5deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* ===== Admin Header with Password Bar ===== */
        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            flex-wrap: wrap;
            gap: 12px;
        }
        .admin-header h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #4ecdc4, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .auth-bar {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .auth-bar input {
            padding: 7px 14px;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(78, 205, 196, 0.2);
            border-radius: 8px;
            color: #fff;
            font-size: 13px;
            outline: none;
            width: 160px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .auth-bar input:focus {
            border-color: #4ecdc4;
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.12);
        }
        .auth-bar input::placeholder { color: #444; }
        .user-badge {
            background: rgba(78, 205, 196, 0.12);
            color: #4ecdc4;
            padding: 5px 14px;
            border-radius: 18px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        /* ===== Lock overlay (shown when not authenticated) ===== */
        .lock-overlay {
            position: fixed;
            inset: 0;
            z-index: 50;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lock-overlay.hidden { display: none; }
        .lock-card {
            text-align: center;
            padding: 40px 36px;
        }
        .lock-card h2 {
            font-size: 20px;
            color: #fff;
            margin-bottom: 8px;
        }
        .lock-card p {
            color: #666;
            font-size: 13px;
            margin-bottom: 28px;
        }
        .lock-input-row {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .lock-input-row input {
            padding: 11px 18px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(78, 205, 196, 0.25);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            outline: none;
            width: 220px;
        }
        .lock-input-row input:focus {
            border-color: #4ecdc4;
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.15);
        }
        .lock-error {
            margin-top: 16px;
            font-size: 13px;
            color: #ef4444;
            display: none;
        }

        /* ===== Buttons ===== */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 9px 20px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: #fff;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            box-shadow: 0 3px 12px rgba(78, 205, 196, 0.25);
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 5px 20px rgba(78, 205, 196, 0.35); }
        .btn-primary:active { transform: translateY(0); }
        .btn-danger {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #ef4444;
            padding: 5px 14px;
            font-size: 12px;
        }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.22); }

        /* ===== Card ===== */
        .card {
            background: rgba(30, 30, 46, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .card-header .icon {
            width: 34px; height: 34px;
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 17px;
        }
        .card-header .icon.green { background: rgba(78, 205, 196, 0.12); }
        .card-header .icon.blue { background: rgba(99, 102, 241, 0.12); }
        .card-header h2 {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
        }

        .input-group { margin-bottom: 16px; }
        .input-group label {
            display: block;
            font-size: 13px;
            color: #888;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            padding: 11px 16px;
            background: rgba(0,0,0,0.25);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 9px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-group input:focus {
            border-color: #4ecdc4;
            box-shadow: 0 0 0 3px rgba(78, 205, 196, 0.12);
        }
        .input-group input::placeholder { color: #444; }

        /* Source list */
        .source-list { list-style: none; }
        .source-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            border-radius: 10px;
            margin-bottom: 8px;
            background: rgba(0,0,0,0.18);
            border: 1px solid rgba(255,255,255,0.04);
            transition: all 0.2s;
        }
        .source-item:hover {
            background: rgba(0,0,0,0.32);
            border-color: rgba(255,255,255,0.07);
        }
        .source-info { flex: 1; min-width: 0; }
        .source-info .name {
            font-size: 14px; font-weight: 600; color: #e0e0e0; margin-bottom: 4px;
        }
        .source-info .url {
            font-size: 12px; color: #666; font-family: "Fira Code", monospace;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .source-info .meta { font-size: 11px; color: #444; margin-top: 4px; }
        .source-actions { margin-left: 12px; flex-shrink: 0; }

        .empty-state { text-align: center; padding: 40px 20px; color: #555; }
        .empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
        .empty-state p { font-size: 14px; }

        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: rgba(0,0,0,0.18);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-card .value { font-size: 26px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .stat-card .label { font-size: 12px; color: #666; }
        .stat-card .value.green { color: #4ecdc4; }
        .stat-card .value.blue { color: #6366f1; }
        .stat-card .value.pink { color: #ec4899; }

        /* Toast */
        .toast {
            position: fixed; top: 20px; right: 20px;
            background: rgba(30, 30, 46, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 14px; color: #fff;
            z-index: 1000;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 320px;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left: 3px solid #4ecdc4; }
        .toast.error { border-left: 3px solid #ef4444; }

        /* Responsive */
        @media (max-width: 640px) {
            .container { padding: 20px 16px; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .admin-header { flex-direction: column; align-items: flex-start; gap: 14px; }
            .source-item { flex-direction: column; align-items: flex-start; gap: 10px; }
            .source-actions { margin-left: 0; }
            .lock-input-row input { width: 180px; }
        }

        /* Locked state blur */
        .locked .container > *:not(.admin-header) { filter: blur(4px); pointer-events: none; opacity: 0.5; transition: all 0.3s; }
    </style>
</head>
<body>

<!-- Lock Overlay -->
<div class="lock-overlay" id="lockOverlay">
    <div class="lock-card">
        <h2>&#128274; 需要验证</h2>
        <p>请输入管理密码以访问控制面板</p>
        <div class="lock-input-row">
            <input type="password" id="lockInput" placeholder="输入管理密码" autofocus>
            <button class="btn btn-primary" onclick="doLogin()">确认</button>
        </div>
        <div class="lock-error" id="lockError">密码错误，请重试</div>
    </div>
</div>

<!-- Main Dashboard -->
<div class="container" id="mainContent">
    <div class="admin-header">
        <h1>TVBox 接口管理</h1>
        <div class="auth-bar" id="authBar" style="display:none;">
            <span class="user-badge">&#10003; 已认证</span>
            <button class="btn btn-danger" onclick="logout()" style="padding: 5px 12px; font-size: 12px;">退出</button>
        </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="value green" id="customCount">-</div>
            <div class="label">自定义接口</div>
        </div>
        <div class="stat-card">
            <div class="value blue" id="totalCount">-</div>
            <div class="label">总线路数</div>
        </div>
        <div class="stat-card">
            <div class="value pink" id="lastUpdate">-</div>
            <div class="label">上次更新</div>
        </div>
    </div>

    <!-- Add new source -->
    <div class="card">
        <div class="card-header">
            <div class="icon green">&#10133;</div>
            <h2>添加自定义接口</h2>
        </div>
        <div class="input-group">
            <label>接口名称</label>
            <input type="text" id="newName" placeholder="例如：我的线路">
        </div>
        <div class="input-group">
            <label>接口地址</label>
            <input type="text" id="newUrl" placeholder="例如：https://example.com/tv">
        </div>
        <button class="btn btn-primary" onclick="addSource()">&#10003; 添加接口</button>
    </div>

    <!-- Source list -->
    <div class="card">
        <div class="card-header">
            <div class="icon blue">&#128203;</div>
            <h2>当前自定义接口</h2>
        </div>
        <ul class="source-list" id="sourceList">
            <li class="empty-state"><div class="icon">&#128194;</div><p>暂无自定义接口</p></li>
        </ul>
    </div>

    <div style="text-align: center; margin-top: 20px; font-size: 12px; color: #444;">
        TVBox Admin &copy; 杰翔易达
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const API_BASE = "/api/admin";
    let authToken = null;

    // Check session on load
    var savedToken = sessionStorage.getItem("tvbox_admin_token");
    if (savedToken) {
        authToken = savedToken;
        unlockUI();
    } else {
        lockUI();
    }

    // Lock input enter key
    document.getElementById("lockInput").addEventListener("keydown", function(e) {
        if (e.key === "Enter") doLogin();
    });

    function lockUI() {
        document.getElementById("mainContent").classList.add("locked");
        document.getElementById("lockOverlay").classList.remove("hidden");
        document.getElementById("authBar").style.display = "none";
    }

    function unlockUI() {
        document.getElementById("mainContent").classList.remove("locked");
        document.getElementById("lockOverlay").classList.add("hidden");
        document.getElementById("authBar").style.display = "flex";
        document.getElementById("lockInput").value = "";
        document.getElementById("lockError").style.display = "none";
        loadSources();
        loadStats();
    }

    async function doLogin() {
        var password = document.getElementById("lockInput").value.trim();
        if (!password) return;

        try {
            var res = await fetch(API_BASE, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + password,
                },
                body: JSON.stringify({ action: "login" }),
            });
            var data = await res.json();
            if (res.ok) {
                authToken = password;
                sessionStorage.setItem("tvbox_admin_token", password);
                unlockUI();
            } else {
                document.getElementById("lockError").textContent = data.error || "密码错误";
                document.getElementById("lockError").style.display = "block";
                document.getElementById("lockInput").select();
            }
        } catch (e) {
            document.getElementById("lockError").textContent = "连接失败: " + e.message;
            document.getElementById("lockError").style.display = "block";
        }
    }

    function logout() {
        authToken = null;
        sessionStorage.removeItem("tvbox_admin_token");
        lockUI();
    }

    function showToast(msg, type) {
        var t = document.getElementById("toast");
        t.textContent = msg;
        t.className = "toast " + type + " show";
        setTimeout(function() { t.classList.remove("show"); }, 3000);
    }

    async function apiCall(body) {
        var res = await fetch(API_BASE, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + authToken },
            body: JSON.stringify(body),
        });
        return { ok: res.ok, data: await res.json() };
    }

    async function loadSources() {
        try {
            var res = await fetch(API_BASE, { headers: { "Authorization": "Bearer " + authToken } });
            var data = await res.json();
            if (data.success) {
                renderSources(data.sources || []);
                document.getElementById("customCount").textContent = data.sources.length;
            }
        } catch (e) { showToast("加载失败: " + e.message, "error"); }
    }

    function renderSources(sources) {
        var list = document.getElementById("sourceList");
        if (sources.length === 0) {
            list.innerHTML = '<li class="empty-state"><div class="icon">&#128194;</div><p>暂无自定义接口</p></li>';
            return;
        }
        list.innerHTML = sources.map(function(s) {
            var timeStr = s.created_at ? new Date(s.created_at).toLocaleString("zh-CN") : "";
            return '<li class="source-item">' +
                '<div class="source-info">' +
                    '<div class="name">' + escHtml(s.name) + '</div>' +
                    '<div class="url" title="' + escHtml(s.url) + '">' + escHtml(s.url) + '</div>' +
                    (timeStr ? '<div class="meta">添加时间: ' + timeStr + '</div>' : '') +
                '</div>' +
                '<div class="source-actions">' +
                    '<button class="btn btn-danger" onclick="delSource(\'' + s.id + '\',\'' + escHtml(s.name).replace(/'/g,"\\'") + '\')">删除</button>' +
                '</div>' +
            '</li>';
        }).join("");
    }

    function escHtml(t) { var d = document.createElement("div"); d.textContent = t; return d.innerHTML; }

    async function addSource() {
        var name = document.getElementById("newName").value.trim();
        var url = document.getElementById("newUrl").value.trim();
        if (!name || !url) { showToast("请填写名称和地址", "error"); return; }
        try {
            var r = await apiCall({ action: "add", name: name, url: url });
            if (r.ok) {
                showToast('"' + name + '" 添加成功', "success");
                document.getElementById("newName").value = "";
                document.getElementById("newUrl").value = "";
                loadSources(); loadStats();
            } else { showToast(r.data.error || "添加失败", "error"); }
        } catch (e) { showToast("添加失败: " + e.message, "error"); }
    }

    async function delSource(id, name) {
        if (!confirm('确定删除 "' + name + '" 吗？')) return;
        try {
            var r = await apiCall({ action: "delete", id: id });
            if (r.ok) { showToast('"' + name + '" 已删除', "success"); loadSources(); loadStats(); }
            else { showToast(r.data.error || "删除失败", "error"); }
        } catch (e) { showToast("删除失败: " + e.message, "error"); }
    }

    async function loadStats() {
        try {
            var res = await fetch("/download/1/tvbox/source.json");
            if (res.ok) { var d = await res.json(); document.getElementById("totalCount").textContent = d.urls.length; }
        } catch(e){}
        try {
            var lr = await fetch("/generate.log");
            if (lr.ok) {
                var lt = await lr.text();
                var lines = lt.trim().split("\n");
                for (var i = lines.length-1; i>=0; i--) {
                    if (lines[i].includes("Done in")) {
                        var m = lines[i].match(/\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}/);
                        document.getElementById("lastUpdate").textContent = m ? m[0].slice(5) : "近日";
                        break;
                    }
                }
            }
        } catch(e){ document.getElementById("lastUpdate").textContent="-"; }
    }

    document.getElementById("newUrl").addEventListener("keydown", function(e) { if (e.key==="Enter") addSource(); });
</script>

</body>
</html>
